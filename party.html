<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        #sync-status {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #00ff00; padding: 10px 20px;
            border-radius: 30px; font-family: 'Courier New', monospace; z-index: 1000;
            border: 1px solid #333; font-size: 14px; pointer-events: none;
        }

        #sync-btn { 
            position: fixed; bottom: 25px; right: 25px; z-index: 1001; 
            padding: 15px 25px; background: #5865F2; color: white; 
            border: none; border-radius: 12px; cursor: pointer; 
            font-family: sans-serif; font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); transition: 0.2s;
        }
        #sync-btn:hover { background: #4752c4; transform: scale(1.05); }
    </style>
</head>
<body>
    <iframe id="player" src="" allowfullscreen></iframe>
    <div id="sync-status">Connecting to Party...</div>
    <button id="sync-btn">JUMP TO HOST</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDes-nr81QpdTeDXHxUJyxuThqnBqOnBfs",
            authDomain: "ace-player-1d45a.firebaseapp.com",
            databaseURL: "https://ace-player-1d45a-default-rtdb.firebaseio.com",
            projectId: "ace-player-1d45a",
            storageBucket: "ace-player-1d45a.firebasestorage.app",
            messagingSenderId: "291893115344",
            appId: "1:291893115344:web:226a4fb052152475dbe1d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const roomId = params.get('room');
        const player = document.getElementById('player');
        const statusDiv = document.getElementById('sync-status');
        
        let isRemoteUpdate = false;
        let lastKnownTime = 0;

        if (movieId && roomId) {
            player.src = `https://www.vidking.net/embed/movie/${movieId}`;
            const roomRef = ref(db, 'rooms/' + roomId);

            // 1. BROADCAST: Listen to player and update Firebase every second
            window.addEventListener("message", (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    // Only the "Host" (person interacting) sends updates
                    if (msg.type === "PLAYER_EVENT" && !isRemoteUpdate) {
                        const d = msg.data;
                        // This sends timeupdate (every sec) + clicks
                        set(roomRef, {
                            event: d.event,
                            time: d.currentTime,
                            timestamp: Date.now()
                        });
                    }
                } catch (e) {}
            });

            // 2. RECEIVE: Update the UI when Firebase changes
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    lastKnownTime = data.time;
                    const mins = Math.floor(data.time / 60);
                    const secs = Math.floor(data.time % 60).toString().padStart(2, '0');
                    
                    statusDiv.innerText = `HOST AT: ${mins}:${secs} [${data.event.toUpperCase()}]`;
                    
                    // We set this so the receiver doesn't bounce the message back to Firebase
                    isRemoteUpdate = true;
                    setTimeout(() => { isRemoteUpdate = false; }, 800);
                }
            });

            // 3. JUMP LOGIC: Try every known method to force the iframe to seek
            document.getElementById('sync-btn').addEventListener('click', () => {
                console.log("Attempting Force Sync to:", lastKnownTime);
                
                // We send multiple variations because different players use different keys
                const syncPackets = [
                    { command: "seek", value: lastKnownTime },
                    { command: "seeked", value: lastKnownTime },
                    { method: "setCurrentTime", value: lastKnownTime },
                    { event: "command", func: "seekTo", args: [lastKnownTime] }
                ];

                syncPackets.forEach(pkg => {
                    player.contentWindow.postMessage(JSON.stringify(pkg), "*");
                });
            });

        } else {
            statusDiv.innerText = "ERROR: MISSING DATA";
        }
    </script>
</body>
</html>
