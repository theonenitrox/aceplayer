<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        #status-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s;
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: #ff4b4b;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4b4b;
        }
    </style>
</head>
<body>
    <iframe id="player" src="" allowfullscreen></iframe>
    <div id="status-overlay">
        <span class="dot"></span>
        <span id="clock-text">WAITING FOR HOST</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDes-nr81QpdTeDXHxUJyxuThqnBqOnBfs",
            authDomain: "ace-player-1d45a.firebaseapp.com",
            databaseURL: "https://ace-player-1d45a-default-rtdb.firebaseio.com",
            projectId: "ace-player-1d45a",
            storageBucket: "ace-player-1d45a.firebasestorage.app",
            messagingSenderId: "291893115344",
            appId: "1:291893115344:web:226a4fb052152475dbe1d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const roomId = params.get('room');
        const player = document.getElementById('player');
        const clockText = document.getElementById('clock-text');
        
        let lastLoggedTime = 0;

        if (movieId && roomId) {
            player.src = `https://www.vidking.net/embed/movie/${movieId}`;
            const roomRef = ref(db, 'rooms/' + roomId);

            // SEND: Throttled update to Firebase
            window.addEventListener("message", (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.data && msg.data.currentTime !== undefined) {
                        const currentTime = Math.floor(msg.data.currentTime);
                        
                        // Only update Firebase every 5 seconds to keep it clean
                        if (currentTime % 5 === 0 && currentTime !== lastLoggedTime) {
                            lastLoggedTime = currentTime;
                            set(roomRef, { time: currentTime });
                        }
                    }
                } catch (e) {}
            });

            // RECEIVE: Live update UI
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.time !== undefined) {
                    const mins = Math.floor(data.time / 60);
                    const secs = Math.floor(data.time % 60).toString().padStart(2, '0');
                    clockText.innerText = `SYNC: ${mins}:${secs}`;
                }
            });

        } else {
            clockText.innerText = "LINK ERROR";
        }
    </script>
</body>
</html>
