<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ace's Movie Center</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="player" src="" allowfullscreen></iframe>
    <script>
        const path = window.location.pathname; // Gets "/movie/1078605"
        const pathParts = path.split('/'); // Splits into ["", "movie", "1078605"]
        const movieId = pathParts[pathParts.length - 1]; // Gets the last part (the ID)

        if (movieId && !isNaN(movieId)) {
            document.getElementById('player').src = `https://www.vidking.net/embed/movie/${movieId}`;
        } else {
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%;'>Invalid Movie ID</h2>";
        }
    </script>
</body>
</html>
