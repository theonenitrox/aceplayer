<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Movie Center</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="player" src="" allowfullscreen></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        if (movieId) {
            document.getElementById('player').src = `https://www.vidking.net/embed/movie/${movieId}`;
        } else {
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:20%;'>No Movie ID Found</h2>";
        }
    </script>
</body>
</html>
