<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Watch Party</title>
    <style>
        :root {
            --theme-color: #ff4b4b;
            --bg-blur: rgba(15, 15, 15, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', -apple-system, sans-serif; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        #status-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-blur);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s;
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--theme-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--theme-color);
        }

        /* Chat UI */
        #chat-drawer {
            position: fixed;
            top: 0; right: -320px;
            width: 300px; height: 100%;
            background: var(--bg-blur);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            color: white;
        }
        #chat-drawer.open { right: 0; }
        
        #chat-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 50px; height: 50px;
            border-radius: 25px;
            background: var(--theme-color);
            border: none; color: white;
            cursor: pointer; z-index: 1002;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 20px;
        }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; }
        .msg:hover { border-left-color: var(--theme-color); background: rgba(255,255,255,0.08); }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; opacity: 0.7; font-size: 11px; }
        .msg-author { font-weight: bold; color: var(--theme-color); }
        .msg-reply { font-size: 11px; opacity: 0.6; padding: 4px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 4px; }

        #chat-input-container { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        #reply-preview { font-size: 11px; padding: 5px; background: var(--theme-color); border-radius: 4px 4px 0 0; display: none; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; }

        /* Theme Mixer */
        #theme-btn { position: fixed; bottom: 80px; right: 20px; background: var(--bg-blur); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 1000; }
        #color-mixer { position: fixed; bottom: 130px; right: 20px; background: var(--bg-blur); padding: 10px; border-radius: 8px; display: none; flex-direction: column; gap: 8px; z-index: 1000; }
    </style>
</head>
<body>
    <iframe id="player" src="" allowfullscreen></iframe>
    
    <div id="status-overlay">
        <span class="dot"></span>
        <span id="clock-text">WAITING FOR HOST</span>
    </div>

    <button id="theme-btn">🎨</button>
    <div id="color-mixer">
        <label style="font-size: 11px; color: white;">Theme Color</label>
        <input type="color" id="theme-picker" value="#ff4b4b">
    </div>

    <button id="chat-toggle">💬</button>
    <div id="chat-drawer">
        <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold;">Room Chat</span>
            <button id="edit-name" style="background: none; border: 1px solid var(--theme-color); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; cursor: pointer;">NAME</button>
        </div>
        <div id="messages"></div>
        <div id="chat-input-container">
            <div id="reply-preview"></div>
            <input type="text" id="chat-input" placeholder="Type a message...">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, onChildAdded } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDes-nr81QpdTeDXHxUJyxuThqnBqOnBfs",
            authDomain: "ace-player-1d45a.firebaseapp.com",
            databaseURL: "https://ace-player-1d45a-default-rtdb.firebaseio.com",
            projectId: "ace-player-1d45a",
            storageBucket: "ace-player-1d45a.firebasestorage.app",
            messagingSenderId: "291893115344",
            appId: "1:291893115344:web:226a4fb052152475dbe1d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const roomId = params.get('room');
        
        // --- USER & THEME STATE ---
        let userName = localStorage.getItem('party-name') || 'User_' + Math.floor(Math.random()*1000);
        let currentReply = null;

        const applyTheme = (color) => {
            document.documentElement.style.setProperty('--theme-color', color);
            localStorage.setItem('party-theme', color);
        };
        applyTheme(localStorage.getItem('party-theme') || '#ff4b4b');

        // --- UI HANDLERS ---
        const drawer = document.getElementById('chat-drawer');
        const msgContainer = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const replyPreview = document.getElementById('reply-preview');

        document.getElementById('chat-toggle').onclick = () => drawer.classList.toggle('open');
        document.getElementById('theme-btn').onclick = () => {
            const mixer = document.getElementById('color-mixer');
            mixer.style.display = mixer.style.display === 'flex' ? 'none' : 'flex';
        };
        document.getElementById('theme-picker').oninput = (e) => applyTheme(e.target.value);
        document.getElementById('edit-name').onclick = () => {
            const newName = prompt("Enter your display name:", userName);
            if (newName) {
                userName = newName;
                localStorage.setItem('party-name', userName);
            }
        };

        // --- CHAT LOGIC ---
        const sendMessage = () => {
            const text = chatInput.value.trim();
            if (!text || !roomId) return;

            const msgRef = ref(db, `rooms/${roomId}/messages`);
            push(msgRef, {
                sender: userName,
                text: text,
                timestamp: serverTimestamp(),
                replyTo: currentReply
            });

            chatInput.value = '';
            currentReply = null;
            replyPreview.style.display = 'none';
        };

        chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

        const renderMessage = (data) => {
            const div = document.createElement('div');
            div.className = 'msg';
            
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            
            let replyHtml = '';
            if (data.replyTo) {
                replyHtml = `<div class="msg-reply"><b>@${data.replyTo.sender}:</b> ${data.replyTo.text.substring(0, 30)}...</div>`;
            }

            div.innerHTML = `
                ${replyHtml}
                <div class="msg-header">
                    <span class="msg-author">${data.sender}</span>
                    <span>${time}</span>
                </div>
                <div class="msg-body">${data.text}</div>
            `;

            div.onclick = () => {
                currentReply = { sender: data.sender, text: data.text };
                replyPreview.innerText = `Replying to ${data.sender}...`;
                replyPreview.style.display = 'block';
                chatInput.focus();
            };

            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        };

        if (roomId) {
            onChildAdded(ref(db, `rooms/${roomId}/messages`), (snapshot) => {
                renderMessage(snapshot.val());
            });
        }

        // --- VIDEO SYNC (Existing) ---
        const player = document.getElementById('player');
        const clockText = document.getElementById('clock-text');
        
        let lastLoggedTime = 0;

        if (movieId && roomId) {
            player.src = `https://www.vidking.net/embed/movie/${movieId}`;
            const roomRef = ref(db, 'rooms/' + roomId);

            // SEND: Throttled update to Firebase
            window.addEventListener("message", (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.data && msg.data.currentTime !== undefined) {
                        const currentTime = Math.floor(msg.data.currentTime);
                        
                        // Only update Firebase every 5 seconds to keep it clean
                        if (currentTime % 5 === 0 && currentTime !== lastLoggedTime) {
                            lastLoggedTime = currentTime;
                            set(roomRef, { time: currentTime });
                        }
                    }
                } catch (e) {}
            });

            // RECEIVE: Live update UI
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.time !== undefined) {
                    const mins = Math.floor(data.time / 60);
                    const secs = Math.floor(data.time % 60).toString().padStart(2, '0');
                    clockText.innerText = `SYNC: ${mins}:${secs}`;
                }
            });

        } else {
            clockText.innerText = "LINK ERROR";
        }
    </script>
</body>
</html>
