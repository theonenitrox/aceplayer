<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace's Screen Share</title>
    <style>
        :root {
            --theme-color: #ff4b4b;
            --bg-blur: rgba(15, 15, 15, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', -apple-system, sans-serif; }
        
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #screenshare-container {
            flex: 1;
            position: relative;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
        }

        #screen-video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Ensures the entire screen is visible */
            background-color: black;
            border: 2px solid var(--theme-color);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px var(--theme-color);
            max-height: 80vh;
        }

        #status-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-blur);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--theme-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            pointer-events: none;
        }

        .dot { height: 8px; width: 8px; background-color: var(--theme-color); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--theme-color); }

        #chat-drawer {
            width: 0;
            height: 100%;
            background: var(--bg-blur);
            backdrop-filter: blur(15px);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            color: white;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        #chat-drawer.open { width: 320px; border-left: 1px solid var(--theme-color); }
        
        #chat-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 50px; height: 50px;
            border-radius: 25px;
            background: var(--theme-color);
            border: none; color: white;
            cursor: pointer; z-index: 1002;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 20px;
        }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 10px; }
        
        .msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; }
        .msg:hover { border-left-color: var(--theme-color); background: rgba(255,255,255,0.08); }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; opacity: 0.7; font-size: 11px; }
        .msg-author { font-weight: bold; color: var(--theme-color); }
        .msg-reply { font-size: 11px; opacity: 0.6; padding: 4px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 4px; border-left: 2px solid var(--theme-color); }

        #chat-input-container { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        #reply-preview { font-size: 11px; padding: 5px; background: var(--theme-color); border-radius: 4px 4px 0 0; display: none; }
        #chat-input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; transition: border 0.3s;
        }
        #chat-input:focus { outline: none; border-color: var(--theme-color); box-shadow: 0 0 8px var(--theme-color); }

        .msg-reactions { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .reaction-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .reaction-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--theme-color); }
        .reaction-btn.active { border-color: var(--theme-color); background: rgba(255, 255, 255, 0.15); }
        
        .add-reaction-trigger { opacity: 0; transition: 0.2s; font-size: 14px; cursor: pointer; padding: 0 5px; color: rgba(255,255,255,0.4); }
        .msg:hover .add-reaction-trigger { opacity: 1; }
        .emoji-picker { position: absolute; background: #1a1a1a; border: 1px solid var(--theme-color); border-radius: 20px; padding: 5px 10px; display: none; z-index: 100; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); top: -35px; right: 0; align-items: center; }
        .emoji-picker span { cursor: pointer; transition: transform 0.2s; }
        .emoji-picker span:hover { transform: scale(1.3); }

        /* Theme Mixer */
        #theme-btn { 
            position: fixed; bottom: 20px; left: 20px; 
            background: var(--bg-blur); border: 1px solid var(--theme-color); 
            color: white; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        #theme-btn:hover { transform: scale(1.1); }
        #color-mixer { 
            position: fixed; bottom: 80px; left: 20px; 
            background: var(--bg-blur); padding: 12px; border-radius: 8px; 
            display: none; flex-direction: column; gap: 8px; z-index: 1000;
            border: 1px solid var(--theme-color);
        }
        #theme-picker { cursor: pointer; border: none; background: none; width: 40px; height: 40px; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--bg-blur); padding: 30px; border-radius: 12px;
            border: 1px solid var(--theme-color); text-align: center; color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 300px;
        }
        .login-input { width: 100%; padding: 12px; margin: 15px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; box-sizing: border-box; }
        .login-input:focus { outline: none; border-color: var(--theme-color); }

        #screenshare-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            gap: 10px;
        }
        #screenshare-controls button {
            background: var(--theme-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        #screenshare-controls button:hover {
            background: var(--theme-color); /* Darker shade on hover */
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="screenshare-container">
            <video id="screen-video" autoplay playsinline></video>
            
            <div id="status-overlay">
                <span class="dot"></span>
                <span id="clock-text">READY FOR SCREEN SHARE</span>
            </div>

            <button id="theme-btn">🎨</button>
            <div id="color-mixer">
                <label style="font-size: 11px; color: white; font-weight: bold;">ACCENT COLOR</label>
                <input type="color" id="theme-picker" value="#ff4b4b">
            </div>

            <div id="screenshare-controls">
                <button id="start-share-btn">Start Sharing Screen</button>
                <button id="stop-share-btn" style="display: none;">Stop Sharing</button>
            </div>
        </div>

        <div id="chat-drawer">
            <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold; font-size: 14px; letter-spacing: 1px; color: var(--theme-color);">ROOM CHAT</span>
                <button id="edit-name" style="background: none; border: 1px solid var(--theme-color); color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer;">NAME</button>
            </div>
            <div id="presence-info" style="padding: 10px 15px; font-size: 11px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);">
                <div style="display: flex; justify-content: space-between;">
                    <span>Active Users: <b id="user-count" style="color: var(--theme-color);">0</b></span>
                </div>
                <div id="user-names-list" style="margin-top: 5px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Connecting...</div>
            </div>
            <div id="messages"></div>
            <div id="chat-input-container">
                <div id="reply-preview"></div>
                <input type="text" id="chat-input" placeholder="Say something...">
            </div>
        </div>
    </div>
    
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--theme-color); margin-top: 0; letter-spacing: 1px;">SCREEN SHARE</h2>
            <p style="font-size: 14px; opacity: 0.8;">Enter a nickname to join the room</p>
            <input type="text" id="login-input" class="login-input" placeholder="Your name...">
            <div style="display: flex; gap: 10px;">
                <button id="login-btn" style="flex: 2; background: var(--theme-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;">Join Room</button>
                <button id="guest-btn" style="flex: 1; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 6px; cursor: pointer;">Guest</button>
            </div>
        </div>
    </div>

    <button id="chat-toggle">💬</button>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, onChildAdded, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDes-nr81QpdTeDXHxUJyxuThqnBqOnBfs", // Replace with your actual Firebase API Key
            authDomain: "ace-player-1d45a.firebaseapp.com",
            databaseURL: "https://ace-player-1d45a-default-rtdb.firebaseio.com",
            projectId: "ace-player-1d45a",
            storageBucket: "ace-player-1d45a.firebasestorage.app",
            messagingSenderId: "291893115344",
            appId: "1:291893115344:web:226a4fb052152475dbe1d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('room');
        
        // --- USER & THEME STATE ---
        let userName = localStorage.getItem('party-name')
        const mySessionId = Math.random().toString(36).substring(2, 11);

        // --- LOGIN LOGIC ---
        const loginOverlay = document.getElementById('login-overlay');
        const loginInput = document.getElementById('login-input');
        
        const completeLogin = (name) => {
            userName = name;
            localStorage.setItem('party-name', userName);
            loginOverlay.style.display = 'none';
            updatePresence(); // Start presence now that we have a name
        };

        if (userName) {
            loginOverlay.style.display = 'none';
        }

        document.getElementById('login-btn').onclick = () => {
            const val = loginInput.value.trim();
            if (val) completeLogin(val);
            else alert("Please enter a name or join as a guest.");
        };

        document.getElementById('guest-btn').onclick = () => {
            completeLogin('Guest_' + Math.floor(Math.random()*9000 + 1000));
        };

        loginInput.onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('login-btn').click(); };

        const applyTheme = (color) => {
            document.documentElement.style.setProperty('--theme-color', color);
            localStorage.setItem('party-theme', color);
        };
        applyTheme(localStorage.getItem('party-theme') || '#ff4b4b');

        // --- UI HANDLERS ---
        const drawer = document.getElementById('chat-drawer');
        const msgContainer = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const replyPreview = document.getElementById('reply-preview');
        const screenVideo = document.getElementById('screen-video');
        const statusText = document.getElementById('clock-text');
        const startShareBtn = document.getElementById('start-share-btn');
        const stopShareBtn = document.getElementById('stop-share-btn');

        document.getElementById('chat-toggle').onclick = () => drawer.classList.toggle('open');
        document.getElementById('theme-btn').onclick = () => {
            const mixer = document.getElementById('color-mixer');
            mixer.style.display = mixer.style.display === 'flex' ? 'none' : 'flex';
        };
        document.getElementById('theme-picker').oninput = (e) => applyTheme(e.target.value);
        document.getElementById('edit-name').onclick = () => {
            const newName = prompt("Enter your display name:", userName);
            if (newName) {
                userName = newName;
                localStorage.setItem('party-name', userName);
                updatePresence();
            }
        };

        // --- PRESENCE LOGIC ---
        const updatePresence = () => {
            if (!roomId) return;
            const myPresenceRef = ref(db, `screenshareRooms/${roomId}/users/${mySessionId}`);
            set(myPresenceRef, { name: userName });
            onDisconnect(myPresenceRef).remove();
        };

        if (roomId) {
            updatePresence();
            onValue(ref(db, `screenshareRooms/${roomId}/users`), (snapshot) => {
                const users = snapshot.val() || {};
                const userArray = Object.values(users).map(u => u.name);
                document.getElementById('user-count').innerText = userArray.length;
                document.getElementById('user-names-list').innerText = userArray.join(', ');
            });
        }

        // --- CHAT LOGIC (Identical to party.html) ---
        const sendMessage = () => {
            const text = chatInput.value.trim();
            if (!text || !roomId) return;

            const msgRef = ref(db, `screenshareRooms/${roomId}/messages`);
            push(msgRef, {
                sender: userName,
                text: text,
                timestamp: serverTimestamp(),
                replyTo: currentReply
            });

            chatInput.value = '';
            currentReply = null;
            replyPreview.style.display = 'none';
        };

        chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

        let lastMsgSender = null;
        let lastMsgElement = null;
        let lastMsgTime = null;
        const emojis = ['❤️', '👍', '🔥', '😂', '😮'];

        const toggleReaction = (msgId, emoji) => {
            const reactionRef = ref(db, `screenshareRooms/${roomId}/messages/${msgId}/reactions/${emoji}/${mySessionId}`);
            get(reactionRef).then(snap => {
                if (snap.exists()) set(reactionRef, null);
                else set(reactionRef, userName);
            });
        };

        const renderMessage = (data, messageId) => {
            const time = data.timestamp ? new Date(data.timestamp) : new Date();
            const timeStr = time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            if (lastMsgSender === data.sender && lastMsgElement && !data.replyTo && (time - lastMsgTime < 120000)) {
                const body = lastMsgElement.querySelector('.msg-body');
                const nextText = document.createElement('div');
                nextText.style.marginTop = '4px';
                nextText.innerText = data.text;
                body.appendChild(nextText);
            } else {
                const div = document.createElement('div');
                div.className = 'msg';
                div.id = `msg-${messageId}`;
                div.style.position = 'relative';
                
                let replyHtml = '';
                if (data.replyTo) {
                    replyHtml = `<div class="msg-reply"><b>@${data.replyTo.sender}:</b> ${data.replyTo.text.substring(0, 30)}...</div>`;
                }

                div.innerHTML = `
                    ${replyHtml}
                    <div class="msg-header">
                        <span class="msg-author">${data.sender}</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="add-reaction-trigger">＋</span>
                            <span>${timeStr}</span>
                        </div>
                    </div>
                    <div class="msg-body">${data.text}</div>
                    <div class="msg-reactions"></div>
                    <div class="emoji-picker">${emojis.map(e => `<span>${e}</span>`).join('')}</div>
                `;

                const picker = div.querySelector('.emoji-picker');
                div.querySelector('.add-reaction-trigger').onclick = (e) => {
                    e.stopPropagation();
                    picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
                };

                picker.querySelectorAll('span').forEach(span => {
                    span.onclick = (e) => {
                        e.stopPropagation();
                        toggleReaction(messageId, span.innerText);
                        picker.style.display = 'none';
                    };
                });

                div.onclick = () => {
                    currentReply = { sender: data.sender, text: data.text };
                    replyPreview.innerText = `Replying to ${data.sender}...`;
                    replyPreview.style.display = 'block';
                    chatInput.focus();
                };

                msgContainer.appendChild(div);
                lastMsgElement = div;

                onValue(ref(db, `screenshareRooms/${roomId}/messages/${messageId}/reactions`), (snapshot) => {
                    const reactions = snapshot.val() || {};
                    const reactionArea = div.querySelector('.msg-reactions');
                    reactionArea.innerHTML = '';
                    Object.keys(reactions).forEach(emoji => {
                        const users = reactions[emoji];
                        const count = Object.keys(users).length;
                        const isMe = users[mySessionId];
                        const btn = document.createElement('div');
                        btn.className = `reaction-btn ${isMe ? 'active' : ''}`;
                        btn.innerHTML = `<span>${emoji}</span> <span>${count}</span>`;
                        btn.onclick = (e) => { e.stopPropagation(); toggleReaction(messageId, emoji); };
                        reactionArea.appendChild(btn);
                    });
                });
            }
            lastMsgSender = data.sender;
            lastMsgTime = time;
            msgContainer.scrollTop = msgContainer.scrollHeight;
        };

        if (roomId) {
            onChildAdded(ref(db, `screenshareRooms/${roomId}/messages`), (snapshot) => {
                renderMessage(snapshot.val(), snapshot.key);
            });
        }

        // --- SIMPLIFIED WEBRTC WITH PEERJS ---
        let peer = null;
        let localStream = null;
        const hostId = `ace-host-${roomId}`; // Fixed ID for the room host

        // Reference to track if someone is currently sharing in this room
        const hostStatusRef = ref(db, `screenshareRooms/${roomId}/host_active`);

        // Automatically connect if a host is detected
        onValue(hostStatusRef, (snapshot) => {
            const isHostActive = snapshot.val();
            if (isHostActive && !localStream) {
                statusText.innerText = "HOST IS LIVE. CONNECTING...";
                joinAsViewer();
                startShareBtn.disabled = true;
                startShareBtn.style.opacity = "0.5";
            } else if (!isHostActive && !localStream) {
                statusText.innerText = "WAITING FOR SHARER...";
                screenVideo.srcObject = null;
                startShareBtn.disabled = false;
                startShareBtn.style.opacity = "1";
            }
        });

        // START SHARING (BECOME THE HOST)
        startShareBtn.onclick = async () => {
            try {
                const activeSnap = await get(hostStatusRef);
                if (activeSnap.val()) {
                    alert("Someone is already sharing in this room!");
                    return;
                }

                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" }, 
                    audio: true 
                });
                
                screenVideo.srcObject = localStream;
                statusText.innerText = "SHARING SCREEN";
                startShareBtn.style.display = 'none';
                stopShareBtn.style.display = 'inline-block';

                // Initialize PeerJS with the fixed Host ID for this room
                if (peer) peer.destroy();
                peer = new Peer(hostId);
                
                peer.on('open', () => {
                    set(hostStatusRef, true); // Mark room as active in Firebase
                });

                peer.on('call', (call) => {
                    call.answer(localStream); // Answer incoming viewer calls with the screen stream
                });

                // Detect when user clicks "Stop Sharing" in the browser's own UI
                localStream.getVideoTracks()[0].onended = () => stopSharing();

            } catch (err) {
                console.error("Error starting screen share:", err);
                statusText.innerText = "SCREEN SHARE FAILED";
            }
        };

        // JOIN AS VIEWER
        function joinAsViewer() {
            if (peer) peer.destroy();
            peer = new Peer(); // Viewers get random IDs

            peer.on('open', () => {
                // Add small timeout to ensure host's PeerJS ID is fully registered on the cloud server
                setTimeout(() => {
                    const call = peer.call(hostId, new MediaStream());
                    call.on('stream', (remoteStream) => {
                        screenVideo.srcObject = remoteStream;
                        statusText.innerText = "VIEWING LIVE";
                    });

                    call.on('error', (err) => {
                        console.error("Peer error:", err);
                        statusText.innerText = "CONNECTION ERROR";
                    });
                }, 1000);
            });
        }

        const stopSharing = () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                screenVideo.srcObject = null;
                localStream = null;

                statusText.innerText = "READY FOR SCREEN SHARE";
                startShareBtn.style.display = 'inline-block';
                stopShareBtn.style.display = 'none';
                
                if (peer) {
                    peer.destroy();
                    remove(hostStatusRef);
                }
            }
        };

        stopShareBtn.onclick = stopSharing;
        window.onbeforeunload = stopSharing; // Ensure room is cleaned up if tab is closed

    </script>
</body>
</html>
